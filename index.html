<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>VERSIONS EYE</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0e0e0c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="VERSIONS EYE">
</head>
<body>
<header class="site-header">
  <div class="wordmark">versions<span class="eye">◉</span>eye</div>
</header>

<main>
  <section id="dropzone" class="dropzone">
    <input type="file" id="file-input" accept="image/*,video/*,audio/*,.heic,.heif" hidden>
    <div class="dropzone-inner">
      <div id="wordmark-art" class="wordmark-art" aria-hidden="true"></div>
      <p class="drop-title">Drop an image<br>or video.</p>
      <p class="hint">click · drag · paste — video up to 15 seconds</p>
      <div class="cta-row">
        <button id="choose-btn" class="btn btn-cta" type="button">choose a file</button>
        <button id="live-btn" class="btn btn-cta btn-cta-lav" type="button">go live</button>
      </div>
      <button id="demo-btn" class="btn btn-demo" type="button">try the demo</button>
    </div>
  </section>

  <section id="workspace" class="workspace" hidden>
    <div class="canvas-panel">
      <div class="canvas-wrap" id="canvas-wrap">
        <canvas id="canvas"></canvas>
      </div>
      <div class="looks-bar-wrap">
        <div class="index-label looks-label">LOOKS</div>
        <div id="looks-bar" class="looks-bar"></div>
      </div>
      <div id="chip-bar" class="chip-bar"></div>
      <div class="canvas-actions">
        <button id="new-image-btn" class="btn" type="button">NEW FILE</button>
        <button id="original-btn" class="btn" type="button">HOLD FOR ORIGINAL</button>
        <button id="playpause-btn" class="btn" type="button" hidden>PAUSE</button>
        <button id="flip-btn" class="btn" type="button" hidden>FLIP CAMERA</button>
        <button id="reroll-btn" class="btn" type="button">REROLL SEED</button>
        <button id="random-btn" class="btn" type="button">RANDOMIZE ALL</button>
      </div>
      <div class="export-bar">
        <div class="export-actions">
          <button id="download-btn" class="btn btn-cta" type="button">png</button>
          <button id="svg-btn" class="btn btn-cta" type="button">svg</button>
          <span id="res-wrap" class="res-wrap" hidden>
            <label for="export-res" class="res-label">RES</label>
            <select id="export-res">
              <option value="1080">1080p — matches preview</option>
              <option value="2160">4K — matches preview</option>
              <option value="preview">preview size (fast)</option>
            </select>
          </span>
          <button id="export-video-btn" class="btn btn-cta" type="button" hidden>mov</button>
          <button id="record-btn" class="btn btn-cta" type="button" hidden>record</button>
        </div>
      </div>
      <div id="app-bar" class="app-bar">
        <button id="ab-new" class="ab-btn" type="button">NEW</button>
        <button id="ab-orig" class="ab-btn" type="button">HOLD</button>
        <button id="ab-play" class="ab-btn" type="button" hidden>PAUSE</button>
        <button id="ab-flip" class="ab-btn" type="button" hidden>FLIP</button>
        <button id="ab-seed" class="ab-btn" type="button">SEED</button>
        <button id="ab-rand" class="ab-btn" type="button">RANDOM</button>
        <button id="ab-export" class="ab-btn ab-primary" type="button">EXPORT</button>
      </div>
    </div>

    <aside class="controls" id="controls">
      <div class="controls-header">
        <div class="index-label">EFFECTS</div>
        <button id="reset-btn" class="btn btn-small" type="button">RESET</button>
      </div>
      <div id="effect-list"></div>

      <div class="controls-header overlays-header">
        <div class="index-label">OVERLAYS</div>
      </div>
      <div id="overlay-module-list"></div>
      <div id="star-section">
        <div class="controls-header star-header">
          <div class="index-label">stars — drag on canvas or use x/y</div>
          <button id="add-star-btn" class="btn btn-small" type="button">+ STAR</button>
        </div>
        <div id="star-list"></div>
      </div>
    </aside>

    <section id="editor-view">
      <div id="ev-top" class="ev-top">
        <div id="ev-preview" class="ev-preview"></div>
        <button id="to-effects" class="nbtn ico-btn ev-effects-btn" type="button"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="3.2"/><path d="M12 2.5v3M12 18.5v3M2.5 12h3M18.5 12h3M5.2 5.2l2.1 2.1M16.7 16.7l2.1 2.1M18.8 5.2l-2.1 2.1M7.3 16.7l-2.1 2.1"/></svg><span>effects</span></button>
      </div>
      <div id="timeline" class="timeline">
        <div class="tl-bar">
          <button id="tl-play" class="nbtn ico-btn" type="button"><svg viewBox="0 0 12 12" width="11" height="11" aria-hidden="true"><path d="M2 1.5v9l8-4.5z" fill="currentColor"/></svg><span>play</span></button>
          <span id="tl-time" class="tl-time">0.0 / 0.0s</span>
          <span class="tl-hint">magnetic timeline · max 15s</span>
          <button id="tl-visualizer" class="nbtn ico-btn" type="button"><svg viewBox="0 0 24 24" width="12" height="12" aria-hidden="true"><path d="M12 2l1.7 5.3L19 9l-5.3 1.7L12 16l-1.7-5.3L5 9l5.3-1.7z" fill="currentColor"/><circle cx="18.5" cy="17.5" r="1.5" fill="currentColor"/></svg><span>visualizer</span></button>
          <button id="tl-add-layer" class="nbtn ico-btn" type="button" title="add a layer"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg><span>layer</span></button>
          <span class="tl-spacer"></span>
          <button id="tl-edit" class="nbtn" type="button" hidden>edit clip</button>
          <button id="tl-del" class="nbtn" type="button" hidden>delete clip</button>
          <select id="tl-aspect" class="tl-aspect" title="aspect ratio">
            <option value="16:9">16:9 landscape</option>
            <option value="9:16">9:16 vertical</option>
            <option value="1:1">1:1 square</option>
          </select>
          <div class="tl-add-wrap">
            <button id="tl-export" class="nbtn nbtn-primary" type="button">export</button>
            <div id="tl-export-menu" class="node-add-menu" hidden></div>
          </div>
          <div class="tl-add-wrap">
            <button id="tl-add" class="nbtn nbtn-primary" type="button">+ media</button>
            <div id="tl-add-menu" class="node-add-menu" hidden>
              <button type="button" data-add="image">image / photo</button>
              <button type="button" data-add="video">video clip</button>
              <button type="button" data-add="audio">audio track</button>
              <button type="button" data-add="camera">camera · photo / record</button>
              <button type="button" data-add="text">text</button>
              <button type="button" data-add="color">color card</button>
            </div>
          </div>
        </div>
        <div id="tl-scroll" class="tl-scroll">
          <div id="tl-ruler" class="tl-ruler"></div>
          <div id="tl-tracks" class="tl-tracks"></div>
          <div id="tl-playhead" class="tl-playhead"></div>
        </div>
      </div>
    </section>

    <section id="node-view" hidden>
      <svg id="node-wires" aria-hidden="true"></svg>
      <div id="node-graph"></div>
      <button id="to-editor" class="nbtn ico-btn node-exit" type="button"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 7l9-4 9 4-9 4z"/><path d="M3 12l9 4 9-4M3 17l9 4 9-4"/></svg><span>editor</span></button>
      <div id="node-add-menu" class="node-add-menu" hidden></div>
      <div id="node-backdrop" hidden></div>
      <div id="node-params" class="node-card node-modal" hidden>
        <div class="node-title node-params-head">
          <span id="node-params-title"></span>
          <button id="node-params-close" class="node-x" type="button">×</button>
        </div>
        <div id="node-params-body"></div>
      </div>
    </section>
  </section>
</main>

<div id="chip-sheet" class="sheet" hidden>
  <div class="sheet-head">
    <span id="sheet-title" class="index-label"></span>
    <button id="sheet-close" class="btn btn-small" type="button">DONE</button>
  </div>
  <div id="sheet-content"></div>
</div>

<div id="capture" class="capture" hidden>
  <div class="capture-inner">
    <video id="capture-video" playsinline muted></video>
    <div class="capture-bar">
      <button id="cap-snap" class="nbtn nbtn-primary" type="button">snap photo</button>
      <button id="cap-rec" class="nbtn" type="button">record</button>
      <button id="cap-flip" class="nbtn" type="button">flip</button>
      <button id="cap-close" class="nbtn" type="button">close</button>
    </div>
  </div>
</div>

<div id="rotate-hint" aria-hidden="true">
  <div class="rotate-glyph"><svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path d="M21 12a9 9 0 1 1-2.6-6.4"/><path d="M21 3.5V8h-4.5"/></svg></div>
  <p>rotate to landscape</p>
  <span>the node studio needs a wider screen</span>
</div>

<div id="toast" class="toast" hidden></div>

<div id="loader" class="loader" hidden>
  <div class="loader-box">
    <div class="loader-bar"></div>
    <span id="loader-text">LOADING…</span>
  </div>
</div>

<footer class="site-footer">
  <span class="muted">files never leave your machine</span>
</footer>

<script src="vendor/mp4-muxer.js"></script>
<script src="effects.js"></script>
<script src="app.js"></script>
</body>
</html>
